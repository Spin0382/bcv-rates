name: Actualizar Tasas BCV

on:
  schedule:
    - cron: '0 8,14,20 * * 1-5'  # 8am, 2pm y 8pm UTC, solo lunes a viernes
  workflow_dispatch:  # Permite correrlo manualmente

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4

      - name: Ejecutar Scraper
        run: python scraper.py

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name 'bcv-bot'
          git config --global user.email 'bcv-bot@users.noreply.github.com'
          git add bcv_rates.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Tasas actualizadas: $(date)"
          git push
