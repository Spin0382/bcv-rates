name: Actualizar Tasas BCV

on:
  schedule:
    # 7am, 10am, 1pm, 4pm y 6pm Hora Venezuela (UTC-4)
    - cron: '0 11,14,17,20,22 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar librerías
        run: pip install requests beautifulsoup4

      - name: Ejecutar Scraper
        run: python scraper.py

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add bcv_rates.json
          # Solo hace commit si hay cambios reales para evitar ruido en el historial
          if ! git diff --cached --quiet; then
            git commit -m "Tasas actualizadas: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          else
            echo "Sin cambios en las tasas, saltando commit."
          fi
